<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Competiciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f5f7f5;} .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container my-5">
    <h2 class="section-title mb-4">Competiciones <span class="badge bg-danger ms-2">@ManyToMany con Club</span></h2>
    <div class="row g-4">
      <div class="col-md-4" th:each="c : ${competiciones}">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-header text-white fw-bold" style="background:#dc3545;" th:text="${c.nombre}"></div>
          <div class="card-body">
            <p class="mb-1"><i class="bi bi-trophy text-warning"></i>
              Premio: <strong>$<span th:text="${#numbers.formatInteger(c.montoPremio, 1, 'COMMA')}"></span></strong></p>
            <p class="mb-1 small text-muted"><i class="bi bi-calendar-event"></i>
              Inicio: <span th:text="${c.fechaInicio}"></span></p>
            <p class="mb-3 small text-muted"><i class="bi bi-calendar-check"></i>
              Fin: <span th:text="${c.fechaFin}"></span></p>
            <a th:href="@{/competiciones/{id}(id=${c.id})}" class="btn btn-outline-danger btn-sm w-100">
              <i class="bi bi-eye"></i> Ver detalle
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
