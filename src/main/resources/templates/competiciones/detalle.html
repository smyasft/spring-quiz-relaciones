<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Detalle Competicion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f5f7f5;} .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container my-5" style="max-width:560px;">
    <a th:href="@{/competiciones}" class="btn btn-outline-secondary btn-sm mb-4"><i class="bi bi-arrow-left"></i> Volver</a>
    <div class="card shadow-sm border-0">
      <div class="card-header text-white fw-bold fs-5 py-3" style="background:#dc3545;" th:text="${competicion.nombre}"></div>
      <div class="card-body py-4">
        <div class="mb-3 p-3 bg-light rounded">
          <p class="mb-1"><i class="bi bi-trophy-fill text-warning"></i>
            Premio: <strong>$<span th:text="${#numbers.formatInteger(competicion.montoPremio, 1, 'COMMA')}"></span></strong></p>
          <p class="mb-1 text-muted small">Inicio: <span th:text="${competicion.fechaInicio}"></span></p>
          <p class="mb-0 text-muted small">Fin: <span th:text="${competicion.fechaFin}"></span></p>
        </div>
        <div class="alert alert-danger mt-3">
          <strong>@ManyToMany</strong> — Esta competicion se relaciona con Club a traves de la tabla intermedia
          <code>clubes_competiciones</code>. Un club puede participar en muchas competiciones y viceversa.
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
