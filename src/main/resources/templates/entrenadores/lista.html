<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Entrenadores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f5f7f5;} .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;} .e-card{border-radius:12px;border:none;box-shadow:0 2px 10px rgba(0,0,0,.07);transition:transform .2s;} .e-card:hover{transform:translateY(-3px);}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5">

    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show mb-4">
      <i class="bi bi-check-circle-fill"></i> <span th:text="${exito}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="section-title mb-0">Entrenadores <span class="badge bg-success ms-2">@OneToOne</span></h2>
      <a th:href="@{/entrenadores/nuevo}" class="btn btn-success">
        <i class="bi bi-plus-circle"></i> Nuevo Entrenador
      </a>
    </div>

    <div class="row g-4">
      <div class="col-md-4" th:each="e : ${entrenadores}">
        <div class="e-card card h-100">
          <div class="card-body text-center py-4">
            <div style="width:60px;height:60px;background:#1a5c2a;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1.6rem;margin:0 auto 12px;">
              <i class="bi bi-person-badge"></i>
            </div>
            <h5 class="fw-bold mb-1" th:text="${e.nombre + ' ' + e.apellido}"></h5>
            <span class="badge bg-light text-muted border" th:text="${e.nacionalidad}"></span>
            <p class="text-muted small mt-2 mb-3">
              <i class="bi bi-calendar3"></i> <span th:text="${e.edad}"></span> años
            </p>
            <div class="d-flex gap-2">
              <a th:href="@{/entrenadores/{id}(id=${e.id})}" class="btn btn-outline-success btn-sm w-100">
                <i class="bi bi-eye"></i> Ver
              </a>
              <a th:href="@{/entrenadores/editar/{id}(id=${e.id})}" class="btn btn-warning btn-sm w-100">
                <i class="bi bi-pencil"></i> Editar
              </a>
              <a th:href="@{/entrenadores/eliminar/{id}(id=${e.id})}" class="btn btn-outline-danger btn-sm"
                 onclick="return confirm('¿Eliminar entrenador?')">
                <i class="bi bi-trash"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
