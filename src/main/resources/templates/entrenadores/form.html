<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${titulo}">Entrenador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f5f7f5;} .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5" style="max-width:560px;">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a th:href="@{/entrenadores}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
      <h2 class="section-title mb-0" th:text="${titulo}"></h2>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form th:action="@{/entrenadores/guardar}" method="post">
          <input type="hidden" name="id" th:value="${entrenador.id}" th:if="${entrenador.id != null}"/>

          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre *</label>
            <input type="text" class="form-control" name="nombre" th:value="${entrenador.nombre}" placeholder="Ej: Hernán" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Apellido *</label>
            <input type="text" class="form-control" name="apellido" th:value="${entrenador.apellido}" placeholder="Ej: Darío" required/>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Edad *</label>
              <input type="number" class="form-control" name="edad" th:value="${entrenador.edad}" min="18" max="90" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nacionalidad *</label>
              <input type="text" class="form-control" name="nacionalidad" th:value="${entrenador.nacionalidad}" placeholder="Ej: Colombiano" required/>
            </div>
          </div>

          <div class="alert alert-info p-2 small mb-4">
            <i class="bi bi-info-circle"></i>
            <strong>@OneToOne:</strong> Este entrenador se asigna a un club desde el formulario del club.
            La FK <code>entrenador_id</code> vive en la tabla <code>clubes</code>.
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success w-100 fw-bold">
              <i class="bi bi-check-circle"></i> Guardar
            </button>
            <a th:href="@{/entrenadores}" class="btn btn-outline-secondary w-100">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
