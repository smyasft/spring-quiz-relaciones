<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Entrenador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f5f7f5;} .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5" style="max-width:500px;">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a th:href="@{/entrenadores}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
      <h2 class="section-title mb-0">Detalle Entrenador</h2>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body py-5 text-center">
        <div style="width:80px;height:80px;background:#1a5c2a;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:2rem;margin:0 auto 16px;">
          <i class="bi bi-person-badge"></i>
        </div>
        <h3 class="fw-bold" th:text="${entrenador.nombre + ' ' + entrenador.apellido}"></h3>
        <p class="text-muted mb-1">Nacionalidad: <strong th:text="${entrenador.nacionalidad}"></strong></p>
        <p class="text-muted mb-4">Edad: <strong th:text="${entrenador.edad}"></strong> años</p>
        <span class="badge bg-success fs-6 px-3 py-2">@OneToOne con Club</span>
        <p class="small text-muted mt-3">FK <code>entrenador_id</code> vive en la tabla <strong>clubes</strong>.</p>
        <a th:href="@{/entrenadores/editar/{id}(id=${entrenador.id})}" class="btn btn-warning mt-2">
          <i class="bi bi-pencil"></i> Editar
        </a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
