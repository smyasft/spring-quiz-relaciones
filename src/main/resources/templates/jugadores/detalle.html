<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Detalle Jugador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f5f7f5;} .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container my-5" style="max-width:500px;">
    <a th:href="@{/jugadores}" class="btn btn-outline-secondary btn-sm mb-4"><i class="bi bi-arrow-left"></i> Volver</a>
    <div class="card shadow-sm border-0">
      <div class="card-body text-center py-5">
        <div style="width:80px;height:80px;background:#1a5c2a;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:2rem;margin:0 auto 16px;">
          <span th:text="${jugador.numero}"></span>
        </div>
        <h3 class="fw-bold" th:text="${jugador.nombre + ' ' + jugador.apellido}"></h3>
        <span class="badge bg-warning text-dark fs-6 mb-3" th:text="${jugador.posicion}"></span>
        <div class="mt-3 text-muted">
          <p>Camiseta #<strong th:text="${jugador.numero}"></strong></p>
          <p class="small">Relacion: <span class="badge bg-warning text-dark">@OneToMany desde Club</span></p>
          <p class="small text-muted">La FK <code>id_club</code> esta en esta tabla (jugadores).</p>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
