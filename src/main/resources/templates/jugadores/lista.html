<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Jugadores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f5f7f5;} .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;} thead th{background:#1a5c2a!important;color:white!important;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="section-title mb-0">
        Jugadores <span class="badge bg-warning text-dark ms-1">@OneToMany desde Club</span>
      </h2>
      <a th:href="@{/clubes}" class="btn btn-outline-success btn-sm">
        <i class="bi bi-arrow-left"></i> Ir a Clubes para agregar jugadores
      </a>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr><th>#</th><th>Camiseta</th><th>Nombre</th><th>Apellido</th><th>Posición</th><th>Ver</th></tr>
          </thead>
          <tbody>
            <tr th:each="j : ${jugadores}">
              <td class="text-muted small" th:text="${j.id}"></td>
              <td><span class="badge bg-dark rounded-circle p-2" th:text="${j.numero}"></span></td>
              <td th:text="${j.nombre}"></td>
              <td class="fw-bold" th:text="${j.apellido}"></td>
              <td><span class="badge bg-warning text-dark" th:text="${j.posicion}"></span></td>
              <td>
                <a th:href="@{/jugadores/{id}(id=${j.id})}" class="btn btn-sm btn-outline-success">
                  <i class="bi bi-eye"></i>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="alert alert-warning mt-3 small">
      <i class="bi bi-info-circle"></i>
      Los jugadores se agregan desde la página de detalle de cada club.
      La FK <code>id_club</code> vive en la tabla <code>jugadores</code> (sin tabla intermedia).
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
