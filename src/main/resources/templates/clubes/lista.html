<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Clubes — Liga Colombia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body{background:#f5f7f5;}
    .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;}
    .badge-rel{font-size:.68rem;}
    thead th{background:#1a5c2a!important;color:white!important;}
  </style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-5">

    <!-- Flash -->
    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show mb-4">
      <i class="bi bi-check-circle-fill"></i> <span th:text="${exito}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="section-title mb-0">&#127968; Clubes Colombianos</h2>
      <a th:href="@{/clubes/nuevo}" class="btn btn-success">
        <i class="bi bi-plus-circle"></i> Nuevo Club
      </a>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Club</th>
              <th>Ciudad</th>
              <th>Fundación</th>
              <th>Entrenador <span class="badge bg-success badge-rel">@OneToOne</span></th>
              <th>Asociación <span class="badge bg-primary badge-rel">@ManyToOne</span></th>
              <th>Jugadores <span class="badge bg-warning text-dark badge-rel">@OneToMany</span></th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="c : ${clubes}">
              <td class="text-muted small" th:text="${c.id}"></td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <span style="font-size:1.1rem;">&#9917;</span>
                  <strong th:text="${c.nombre}"></strong>
                </div>
              </td>
              <td th:text="${c.ciudad}"></td>
              <td th:text="${c.anioFundacion}"></td>
              <td>
                <span th:if="${c.entrenador != null}" class="text-success fw-semibold"
                      th:text="${c.entrenador.nombre + ' ' + c.entrenador.apellido}"></span>
                <span th:if="${c.entrenador == null}" class="badge bg-secondary">Sin DT</span>
              </td>
              <td>
                <span th:if="${c.asociacion != null}" class="badge bg-primary"
                      th:text="${c.asociacion.nombre}"></span>
                <span th:if="${c.asociacion == null}" class="badge bg-secondary">—</span>
              </td>
              <td>
                <span class="badge bg-warning text-dark"
                      th:text="${#lists.size(c.jugadores)} + ' jugadores'"></span>
              </td>
              <td>
                <div class="d-flex gap-1">
                  <a th:href="@{/clubes/{id}(id=${c.id})}" class="btn btn-sm btn-success" title="Ver detalle">
                    <i class="bi bi-eye"></i>
                  </a>
                  <a th:href="@{/clubes/editar/{id}(id=${c.id})}" class="btn btn-sm btn-warning" title="Editar">
                    <i class="bi bi-pencil"></i>
                  </a>
                  <a th:href="@{/clubes/eliminar/{id}(id=${c.id})}" class="btn btn-sm btn-danger" title="Eliminar"
                     onclick="return confirm('¿Eliminar este club y todos sus jugadores?')">
                    <i class="bi bi-trash"></i>
                  </a>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
