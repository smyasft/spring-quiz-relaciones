<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Asociaciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>body{background:#f5f7f5;} .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container my-5">
    <h2 class="section-title mb-4">Asociaciones <span class="badge bg-primary ms-2">@ManyToOne desde Club</span></h2>
    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead style="background:#1a5c2a;color:white;">
            <tr><th>#</th><th>Nombre</th><th>Pais</th><th>Presidente</th></tr>
          </thead>
          <tbody>
            <tr th:each="a : ${asociaciones}">
              <td th:text="${a.id}"></td>
              <td class="fw-bold" th:text="${a.nombre}"></td>
              <td><span class="badge bg-info text-dark" th:text="${a.pais}"></span></td>
              <td th:text="${a.presidente}"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="alert alert-primary mt-4">
      <strong>@ManyToOne:</strong> Muchos clubes pueden pertenecer a una misma asociacion.
      La FK <code>asociacion_id</code> vive en la tabla <code>clubes</code>.
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
