<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Detalle Asociacion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body{background:#f5f7f5;} .section-title{font-weight:700;color:#1a5c2a;border-left:4px solid #f5c518;padding-left:12px;}</style>
</head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container my-5" style="max-width:500px;">
    <a th:href="@{/asociaciones}" class="btn btn-outline-secondary btn-sm mb-4">Volver</a>
    <div class="card shadow-sm border-0">
      <div class="card-body py-5 text-center">
        <div style="font-size:3rem;">&#127758;</div>
        <h3 class="fw-bold mt-2" th:text="${asociacion.nombre}"></h3>
        <p class="text-muted">Pais: <strong th:text="${asociacion.pais}"></strong></p>
        <p class="text-muted">Presidente: <strong th:text="${asociacion.presidente}"></strong></p>
        <span class="badge bg-primary fs-6 mt-2">@ManyToOne desde Club</span>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
